branch_settings:
  production_branches:
  - main
  - develop
  - release/*
mandatory:
- 00-zero-trust-policy
- 01-saas-architecture-policy
- 02-dpdpa-compliance
- 12-data-persistence-patterns
- 20-clean-code-standards
optional:
  03-hipaa-compliance: true
  04-soc2-compliance: true
  05-iso27001-compliance: true
  10-backend-patterns: true
  11-frontend-patterns: true
  21-ruby-rails-patterns: true
  22-python-patterns: true
  23-typescript-patterns: true
  24-go-patterns: true
auto_detect:
  python:
  - requirements.txt
  - pyproject.toml
  - setup.py
  ruby:
  - Gemfile
  - Gemfile.lock
  typescript:
  - package.json
  - tsconfig.json
  go:
  - go.mod
  - go.sum
  backend:
  - requirements.txt
  - Gemfile
  - go.mod
  frontend:
  - package.json
  - tsconfig.json
